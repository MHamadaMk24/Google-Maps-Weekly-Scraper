name: Last 7 Days Reviews -> ClickUp

on:
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Run in dry-run mode (no ClickUp upload)"
        required: false
        default: "false"
      makan_limit:
        description: "Limit MAKAN locations (optional)"
        required: false
        default: ""
      competitor_limit:
        description: "Limit competitor locations (optional)"
        required: false
        default: ""
  repository_dispatch:
    types: [run-last-7-days-batch]

jobs:
  run-batch:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
      CLICKUP_DEFAULT_LIST_ID: ${{ secrets.CLICKUP_DEFAULT_LIST_ID }}
      CLICKUP_WORKSPACE_NAME: ${{ secrets.CLICKUP_WORKSPACE_NAME }}
      CLICKUP_SPACE_NAME: ${{ secrets.CLICKUP_SPACE_NAME }}
      CLICKUP_MAKAN_LIST_NAME: ${{ secrets.CLICKUP_MAKAN_LIST_NAME }}
      CLICKUP_COMPETITOR_LIST_NAME: ${{ secrets.CLICKUP_COMPETITOR_LIST_NAME }}
      CLICKUP_STATUS: ${{ secrets.CLICKUP_STATUS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build CLI options from trigger payload
        id: args
        shell: bash
        run: |
          set -euo pipefail
          EXTRA_ARGS="--headless"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.test_mode }}" == "true" ]]; then
              EXTRA_ARGS="$EXTRA_ARGS --test"
            fi
            if [[ -n "${{ inputs.makan_limit }}" ]]; then
              EXTRA_ARGS="$EXTRA_ARGS --makan-limit ${{ inputs.makan_limit }}"
            fi
            if [[ -n "${{ inputs.competitor_limit }}" ]]; then
              EXTRA_ARGS="$EXTRA_ARGS --competitor-limit ${{ inputs.competitor_limit }}"
            fi
          fi

          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            if [[ "${{ github.event.client_payload.test_mode }}" == "true" ]]; then
              EXTRA_ARGS="$EXTRA_ARGS --test"
            fi
            if [[ -n "${{ github.event.client_payload.makan_limit }}" ]]; then
              EXTRA_ARGS="$EXTRA_ARGS --makan-limit ${{ github.event.client_payload.makan_limit }}"
            fi
            if [[ -n "${{ github.event.client_payload.competitor_limit }}" ]]; then
              EXTRA_ARGS="$EXTRA_ARGS --competitor-limit ${{ github.event.client_payload.competitor_limit }}"
            fi
          fi

          echo "extra_args=$EXTRA_ARGS" >> "$GITHUB_OUTPUT"
          echo "CLI args: $EXTRA_ARGS"

      - name: Run scraper batch
        run: |
          python last_7_days_batch_to_clickup.py ${{ steps.args.outputs.extra_args }}
