name: Google Maps Weekly Scraper

on:
  workflow_dispatch:
  repository_dispatch:
    types: [run-weekly-scraper]

jobs:
  run-batch:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
      CLICKUP_WORKSPACE_NAME: ${{ secrets.CLICKUP_WORKSPACE_NAME }}
      CLICKUP_SPACE_NAME: ${{ secrets.CLICKUP_SPACE_NAME }}
      CLICKUP_MAKAN_LIST_NAME: ${{ secrets.CLICKUP_MAKAN_LIST_NAME }}
      CLICKUP_COMPETITOR_LIST_NAME: ${{ secrets.CLICKUP_COMPETITOR_LIST_NAME }}
      CLICKUP_STATUS: ${{ secrets.CLICKUP_STATUS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weekly scraper
        run: python last_7_days_batch_to_clickup.py --headless
